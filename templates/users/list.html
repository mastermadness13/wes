{% extends 'base.html' %}
{% block content %}
<style>
/* تحسين الأزرار */
.btn {
  border-radius: 0.375rem;
  padding: 0.375rem 0.75rem;
  font-size: 0.875rem;
  transition: all 0.2s ease;
  border: none;
  font-weight: 500;
}

.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 8px rgba(0,0,0,0.15);
}

.btn-primary {
  background-color: #007bff;
  color: white;
}

.btn-primary:hover {
  background-color: #0056b3;
}

.btn-secondary {
  background-color: #6c757d;
  color: white;
}

.btn-secondary:hover {
  background-color: #545b62;
}

.btn-danger {
  background-color: #dc3545;
  color: white;
}

.btn-danger:hover {
  background-color: #c82333;
}

.btn-success {
  background-color: #28a745;
  color: white;
}

.btn-success:hover {
  background-color: #1e7e34;
}

.btn-warning {
  background-color: #ffc107;
  color: #212529;
}

.btn-warning:hover {
  background-color: #e0a800;
}

.btn-sm {
  padding: 0.25rem 0.5rem;
  font-size: 0.75rem;
}

/* Responsive للأزرار */
@media (max-width: 768px) {
  .btn {
    padding: 0.25rem 0.5rem;
    font-size: 0.75rem;
  }
}
</style>
<h2>إدارة المستخدمين</h2>
<a class="btn btn-success mb-3" href="{{ url_for('users.create_user') }}">إضافة مستخدم</a>
<table class="table table-bordered">
    <thead class="thead-dark"><tr><th>#</th><th>اسم المستخدم</th><th>القسم</th><th>الدور</th><th>إنشاء</th><th>إجراءات</th></tr></thead>
    <tbody>
    {% for u in users %}
        <tr>
            <td>{{ u.id }}</td>
            <td>{{ u.username }}</td>
            <td>{{ u.label }}</td>
            <td>{{ u.role }}</td>
            <td>{{ u.created_at }}</td>
            <td>
                <a class="btn btn-sm btn-primary" href="{{ url_for('users.edit_user', user_id=u.id) }}">تعديل</a>
                <a class="btn btn-sm btn-warning" href="{{ url_for('users.change_password', user_id=u.id) }}">تغيير كلمة المرور</a>
                <form method="post" action="{{ url_for('users.delete_user', user_id=u.id) }}" style="display:inline;" onsubmit="return confirm('هل أنت متأكد؟');">
                    <button class="btn btn-sm btn-danger" type="submit">حذف</button>
                </form>
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
