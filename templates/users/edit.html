{% extends 'base.html' %}
{% block content %}
<h2>تعديل مستخدم</h2>
<form method="post">
    <div class="form-group"><label>اسم المستخدم</label><input value="{{ user.username }}" class="form-control" name="username" required></div>
    <div class="form-group"><label>الدور</label><select class="form-control" name="role"><option value="admin" {% if user.role == 'admin' %}selected{% endif %}>admin</option><option value="super_admin" {% if user.role == 'super_admin' %}selected{% endif %}>super_admin</option></select></div>
    <div class="form-group"><label>القسم</label><input value="{{ user.label }}" class="form-control" name="label" required></div>
    <button class="btn btn-primary" type="submit">تحديث</button>
</form>
{% endblock %}
