{% extends 'base.html' %}
{% block content %}
<div class="user-form-shell">
  <div class="user-form-card">
    <h2 class="mb-1">تعديل المستخدم</h2>
    <p class="role-note mb-4">يمكن للمشرف العام تعديل الدور وربط القسم، بينما يستطيع المستخدم العادي تعديل بياناته الأساسية فقط.</p>

    <form method="post">
      <div class="form-group">
        <label>اسم المستخدم</label>
        <input value="{{ user.username }}" class="form-control" name="username" required>
      </div>

      {% if session.get('role') == 'super_admin' %}
      <div class="form-group">
        <label>الدور</label>
        <select class="form-control" name="role">
          <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>أدمن</option>
          <option value="super_admin" {% if user.role == 'super_admin' %}selected{% endif %}>سوبر أدمن</option>
        </select>
      </div>
      {% endif %}

      <div class="form-group">
        <label>الاسم الظاهر</label>
        <input value="{{ user.label }}" class="form-control" name="label" required>
      </div>

      {% if session.get('role') == 'super_admin' %}
      <div class="form-group">
        <label>ربط القسم</label>
        <select class="form-control" name="department_id">
          <option value="">No department</option>
          {% for dept in departments %}
          <option value="{{ dept.id }}" {% if user.department_id == dept.id %}selected{% endif %}>{{ dept.name }}</option>
          {% endfor %}
        </select>
      </div>
      {% endif %}

      <button class="btn btn-primary" type="submit">حفظ التعديلات</button>
    </form>
  </div>
</div>
{% endblock %}
