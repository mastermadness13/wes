{% extends 'base.html' %}
{% block content %}
<h2>إضافة حضور</h2>
<form method="post">
    <div class="form-group"><label>الطالب</label>
        <select class="form-control" name="student_id" required>
            {% for s in students %}
            <option value="{{ s.id }}">{{ s.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group"><label>التاريخ</label><input type="date" class="form-control" name="date" required></div>
    <div class="form-group"><label>الحالة</label>
        <select class="form-control" name="status" required>
            <option value="حاضر">حاضر</option>
            <option value="غائب">غائب</option>
            <option value="متأخر">متأخر</option>
        </select>
    </div>
    <div class="form-group"><label>ملاحظات</label><textarea class="form-control" name="note"></textarea></div>
    <button class="btn btn-success" type="submit">حفظ</button>
</form>
{% endblock %}
