{% extends 'base.html' %}
{% block content %}
<div class="course-form-shell">
  <div class="course-form-card bg-white">
    <div class="course-form-head">
      <div>
        <h2 class="mb-1">إضافة مادة جديدة</h2>
        <div class="text-muted">أدخل بيانات المادة مع رمزها والقسم والسنة والملاحظات.</div>
      </div>
      <a href="{{ url_for('courses.list_courses') }}" class="btn btn-outline-secondary">العودة إلى قائمة المواد</a>
    </div>

    <div class="course-form-body">
      <form method="post">
        <div class="course-grid">
          <div class="form-group full">
            <label for="name">اسم المادة</label>
            <input id="name" class="form-control" name="name" value="{{ form_data.name }}" required>
          </div>

          <div class="form-group">
            <label for="department">القسم</label>
            <select id="department" class="form-control" name="department" required>
              <option value="">اختر القسم</option>
              {% for d in departments %}
              <option value="{{ d.name }}" {% if d.name == form_data.department %}selected{% endif %}>{{ d.name }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="form-group">
            <label for="year">السنة الدراسية</label>
            <select id="year" class="form-control" name="year" required>
              {% for option in [1, 2, 3, 4] %}
              <option value="{{ option }}" {% if form_data.year|string == option|string %}selected{% endif %}>السنة {{ option }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="form-group full">
            <label for="code">رمز المادة</label>
            <div class="code-row">
              <input id="code" class="form-control" name="code" value="{{ form_data.code }}" placeholder="هـ101" required>
              <button class="btn btn-outline-primary" type="button" id="generateCodeBtn">اقتراح رمز تلقائي</button>
            </div>
            <div class="code-helper">مثال: هـ101 أو ت205 أو ع102.</div>
          </div>

          <div class="form-group full">
            <label for="notes">الملاحظات</label>
            <textarea id="notes" class="form-control" name="notes" rows="4" placeholder="ملاحظات اختيارية">{{ form_data.notes }}</textarea>
          </div>
        </div>

        <div class="d-flex justify-content-end mt-3">
          <button class="btn btn-success px-4" type="submit">حفظ المادة</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/courses.js') }}"></script>
{% endblock %}
