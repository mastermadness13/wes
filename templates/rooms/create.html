{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>إضافة قاعة</h2>
    <form method="post">
        {% if csrf_token %}
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        {% endif %}
        <div class="form-group">
            <label>اسم القاعة (إنجليزي)</label>
            <input type="text" class="form-control" name="name" required>
        </div>
        <div class="form-group">
            <label>اسم القاعة (عربي)</label>
            <input type="text" class="form-control" name="name_ar">
        </div>
        <div class="form-group">
            <label>نوع القاعة</label>
            <select class="form-control" name="type" required>
                <option value="قاعة">قاعة</option>
                <option value="معمل">معمل</option>
                <option value="مسرح">مسرح</option>
            </select>
        </div>
        <div class="form-group">
            <label>حالة القاعة</label>
            <select class="form-control" name="status" required>
                <option value="متاحة">متاحة</option>
                <option value="غير متاحة">غير متاحة</option>
                <option value="مستخدمة">مستخدمة</option>
                <option value="صيانة">صيانة</option>
                <option value="مقفلة">مقفلة</option>
            </select>
        </div>
        <div class="form-group">
            <label>السعة</label>
            <input type="number" class="form-control" name="capacity">
        </div>
        <div class="form-group">
            <label>الأجهزة</label>
            <input type="number" class="form-control" name="devices">
        </div>
        <div class="form-group">
            <label>الموقع</label>
            <select class="form-control" name="location" required>
                <option value="الدور الأرضي">الدور الأرضي</option>
                <option value="الدور الأول">الدور الأول</option>
                <option value="الدور الثاني">الدور الثاني</option>
                <option value="الدور الثالث">الدور الثالث</option>
                <option value="الدور الرابع">الدور الرابع</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">حفظ</button>
        <a href="{{ url_for('rooms.list_rooms') }}" class="btn btn-secondary">إلغاء</a>
    </form>
</div>
{% endblock %}
