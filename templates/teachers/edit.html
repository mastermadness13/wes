{% extends 'base.html' %}
{% block content %}
<h2>تعديل عضو هيئة التدريس أو المعيد</h2>
<form method="post">
    <div class="form-group">
        <label>الاسم الكامل</label>
        <input value="{{ teacher.name }}" class="form-control" name="name" required>
    </div>
    <div class="form-group">
        <label>الرقم الأكاديمي</label>
        <input value="{{ teacher.academic_number }}" class="form-control" name="academic_number" required>
    </div>
    <div class="form-group">
        <label>الرقم الوطني</label>
        <input value="{{ teacher.national_id }}" class="form-control" name="national_id" required>
    </div>
    <div class="form-group">
        <label>المؤهل العلمي</label>
        <select class="form-control" name="qualification" id="qualificationSelect" required>
            <option value="">اختر المؤهل</option>
            <option value="دبلوم" {% if teacher.qualification == 'دبلوم' %}selected{% endif %}>دبلوم</option>
            <option value="بكالوريوس" {% if teacher.qualification == 'بكالوريوس' %}selected{% endif %}>بكالوريوس</option>
            <option value="ماجستير" {% if teacher.qualification == 'ماجستير' %}selected{% endif %}>ماجستير</option>
        </select>
    </div>
    <div class="form-group">
        <label>الدرجة العلمية</label>
        <select class="form-control" name="academic_rank" id="rankSelect" required>
            <option value="">اختر الدرجة</option>
            <option value="أستاذ" {% if teacher.academic_rank == 'أستاذ' %}selected{% endif %}>أستاذ</option>
            <option value="أستاذ مشارك" {% if teacher.academic_rank == 'أستاذ مشارك' %}selected{% endif %}>أستاذ مشارك</option>
            <option value="أستاذ مساعد" {% if teacher.academic_rank == 'أستاذ مساعد' %}selected{% endif %}>أستاذ مساعد</option>
            <option value="محاضر" {% if teacher.academic_rank == 'محاضر' %}selected{% endif %}>محاضر</option>
            <option value="محاضر مساعد" {% if teacher.academic_rank == 'محاضر مساعد' %}selected{% endif %}>محاضر مساعد</option>
            <option value="أستاذ متعاون" {% if teacher.academic_rank == 'أستاذ متعاون' %}selected{% endif %}>أستاذ متعاون</option>
        </select>
    </div>
    <div class="form-group">
        <label>الصنف / الفئة</label>
        <select class="form-control" name="category" required>
            <option value="">اختر الصنف</option>
            <option value="عضو هيئة تدريس" {% if teacher.category == 'عضو هيئة تدريس' %}selected{% endif %}>عضو هيئة تدريس</option>
            <option value="عضو هيئة تدريس متعاون" {% if teacher.category == 'عضو هيئة تدريس متعاون' %}selected{% endif %}>عضو هيئة تدريس متعاون</option>
            <option value="معيد" {% if teacher.category == 'معيد' %}selected{% endif %}>معيد</option>
        </select>
    </div>
    <div class="form-group">
        <label>رقم الهاتف</label>
        <input value="{{ teacher.phone }}" class="form-control" name="phone">
    </div>
    <div class="form-group">
        <label>القسم</label>
        <select class="form-control" name="department">
            <option value="">اختر القسم</option>
            {% for d in departments %}
            <option value="{{ d.name }}" {% if d.name == teacher.department %}selected{% endif %}>{{ d.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label>المادة</label>
        <select class="form-control" name="subject">
            <option value="">اختر المادة</option>
            {% for s in subjects %}
            <option value="{{ s.name }}" {% if s.name == teacher.subject %}selected{% endif %}>{{ s.name }}</option>
            {% endfor %}
        </select>
    </div>
    <button class="btn btn-primary" type="submit">حفظ التعديلات</button>
</form>

<script>
// منطق ديناميكي بين المؤهل العلمي والدرجة العلمية
const qualificationToRanks = {
  'دبلوم': ['محاضر مساعد', 'أستاذ متعاون', 'معيد'],
  'بكالوريوس': ['محاضر مساعد', 'محاضر', 'أستاذ متعاون'],
  'ماجستير': ['محاضر', 'أستاذ مساعد', 'أستاذ متعاون']
};

function updateRanks() {
  const qualification = document.getElementById('qualificationSelect').value;
  const rankSelect = document.getElementById('rankSelect');
  const current = rankSelect.value;
  const allowed = qualificationToRanks[qualification] || [
    'أستاذ', 'أستاذ مشارك', 'أستاذ مساعد', 'محاضر', 'محاضر مساعد', 'أستاذ متعاون'
  ];
  for (const opt of rankSelect.options) {
    if (opt.value === '') continue;
    opt.style.display = allowed.includes(opt.value) ? '' : 'none';
    if (!allowed.includes(current)) rankSelect.value = '';
  }
}
document.getElementById('qualificationSelect').addEventListener('change', updateRanks);
window.addEventListener('DOMContentLoaded', updateRanks);
</script>
{% endblock %}
