{% extends 'base.html' %}
{% block content %}
<div class="card-section">
  <div class="page-title mb-3">
    <div class="page-summary">
      <h2>إضافة حصة جديدة</h2>
      <p>اختر اليوم والفصل والفترة، ثم اربط المادة والمدرس والقاعة المتاحة.</p>
    </div>
    <a href="{{ next_url or url_for('timetable.list_timetable') }}" class="btn btn-outline-secondary">العودة إلى الجدول</a>
  </div>

  <form method="post" id="timetableForm">
    <input type="hidden" name="next" value="{{ next_url }}">
    <div class="form-grid">
      <div class="form-group">
        <label for="day">اليوم</label>
        <select class="form-control" name="day" id="day" required>
          {% for day in days %}
          <option value="{{ day }}" {% if day == default_day %}selected{% endif %}>{{ day }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="semester">الفصل الدراسي</label>
        <select class="form-control" name="semester" id="semester" required>
          {% for sem in range(1, 8) %}
          <option value="{{ sem }}" {% if sem == default_semester %}selected{% endif %}>الفصل {{ sem }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="period">الفترة</label>
        <select class="form-control" name="section" id="period" required>
          {% for period in enabled_periods %}
          <option value="{{ period.code }}" {% if period.code == default_period_code %}selected{% endif %}>{{ period.label }} — {{ period.start_time }} حتى {{ period.end_time }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="course_id">المقرر</label>
        <select class="form-control" name="course_id" id="course_id" required>
          {% for course in courses %}
          <option value="{{ course.id }}">{{ course.name }} — {{ course.code }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="teacher_id">المدرس</label>
        <select class="form-control" name="teacher_id" id="teacher_id" required>
          {% for teacher in teachers %}
          <option value="{{ teacher.id }}">{{ teacher.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group full">
        <label for="room_id">القاعة</label>
        <select class="form-control" name="room_id" id="room_id" required>
          {% for room in initial_rooms %}
          <option value="{{ room.id }}" {% if not room.is_available %}disabled{% endif %}>
            {{ room.name_ar or room.name }}{% if not room.is_available %} - محجوزة{% endif %}
          </option>
          {% endfor %}
          {% if not initial_rooms %}
          <option value="">لا توجد قاعات متاحة</option>
          {% endif %}
        </select>
        <small class="small-note">ستظهر جميع القاعات، وتُعطل فقط القاعات المحجوزة في نفس الفترة.</small>
      </div>
    </div>

    <div class="form-actions mt-3">
      <button class="btn btn-primary" type="submit" id="submitBtn">حفظ الحصة</button>
    </div>
  </form>
</div>

<script>
  window.allCourses = {{ courses|tojson|safe }};
  window.allTeachers = {{ teachers|tojson|safe }};
</script>
<script src="{{ url_for('static', filename='js/timetable.js') }}"></script>
{% endblock %}
