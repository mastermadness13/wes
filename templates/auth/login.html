{% extends 'base.html' %}
{% block content %}
<section class="auth-screen">
  <div class="auth-layout">
 
    <div class="auth-card auth-login-card">
      <div class="auth-header">
        <span class="auth-logo">A</span>
        <h2 class="auth-title">تسجيل الدخول</h2>
        <p class="auth-subtitle">أدخل بياناتك للوصول إلى لوحة التحكم.</p>
      </div>

      <form method="post" class="auth-form" id="loginForm">
        <div class="form-group">
          <label for="username">اسم المستخدم</label>
          <input type="text" id="username" name="username" class="form-control" autocomplete="username" required>
        </div>

        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <div class="auth-password-group">
            <input type="password" name="password" id="password" class="form-control auth-password-input" autocomplete="current-password" required>
            <button type="button" class="auth-password-toggle" id="togglePassword" aria-label="إظهار كلمة المرور" data-haptic="soft">
              <span class="password-toggle-label">إظهار</span>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary auth-submit-btn" data-haptic="medium">دخول</button>
      </form>

      <div class="auth-footer">
        <span>نظام إدارة الأكاديمية</span>
      </div>
    </div>
  </div>
</section>
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
