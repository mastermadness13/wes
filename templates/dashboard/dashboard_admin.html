{% extends 'base.html' %}
{% block content %}
<style>
.dashboard-stack { display: grid; gap: 1.25rem; }
.dashboard-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow); padding: 1.25rem 1.5rem; }
.dashboard-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 1rem; }
.metric-box { border: 1px solid var(--border); border-radius: 14px; padding: 1rem; background: var(--surface-2); text-align: center; }
.metric-value { font-size: 2rem; font-weight: 800; }
.list-clean { margin: 0; padding-right: 1rem; }
</style>
<div class="dashboard-stack">
  <section class="dashboard-card">
    <h2 class="mb-2">لوحة القيادة - المشرف</h2>
    <p class="text-muted mb-0">يمنحك هذا القسم نظرة عامة على النظام والإحصائيات المهمة.</p>
  </section>

  <section class="dashboard-card">
    <h4 class="mb-3">الجدول الدراسي</h4>
    <a href="{{ url_for('timetable.list_timetable') }}?semester=2&semester=3&semester=4&semester=5&semester=6&semester=7&semester=8" class="btn btn-primary">عرض الجدول الدراسي</a>
  </section>
</div>
{% endblock %}
