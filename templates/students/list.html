{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">Students</h2>
    <a href="{{ url_for('students.create_student') }}" class="btn btn-success">إضافة طالب</a>
</div>

{% if session.role == 'super_admin' %}
<form class="form-row mb-3" method="get">
    <div class="col-md-4 mb-2">
        <input class="form-control" name="department" value="{{ department }}" placeholder="Department">
    </div>
    <div class="col-md-4 mb-2">
        <input class="form-control" name="class" value="{{ class_name }}" placeholder="Class">
    </div>
    <div class="col-md-4 mb-2">
        <button class="btn btn-primary" type="submit">Filter</button>
        <a class="btn btn-secondary" href="{{ url_for('students.list_students') }}">Reset</a>
    </div>
</form>
{% endif %}

<div class="table-responsive">
    <table class="table table-bordered table-striped">
        <thead class="thead-dark">
            <tr>
                <th>Name</th>
                <th>Department</th>
                <th>Class</th>
                <th style="width: 170px;">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for s in students %}
            <tr>
                <td>{{ s.name }}</td>
                <td>{{ s.department }}</td>
                <td>{{ s['class'] }}</td>
                <td>
                    <a href="{{ url_for('students.edit_student', id=s.id) }}" class="btn btn-sm btn-primary">تعديل</a>
                    <form method="post" action="{{ url_for('students.delete_student', id=s.id) }}" style="display:inline;" onsubmit="return confirm('هل أنت متأكد؟');">
                        <button class="btn btn-sm btn-danger" type="submit">حذف</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" class="text-center text-muted">No students found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
