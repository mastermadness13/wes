{% extends 'base.html' %}
{% block content %}
<h2>تعديل الطالب</h2>
<form method="post">
    <div class="form-group">
        <label>Name</label>
        <input class="form-control" name="name" value="{{ student.name }}" required>
    </div>
    <div class="form-group">
        <label>Department</label>
        <input class="form-control" name="department" value="{{ student.department }}" required>
    </div>
    <div class="form-group">
        <label>Class</label>
        <input class="form-control" name="class" value="{{ student['class'] }}" required>
    </div>
    <button class="btn btn-primary" type="submit">تحديث</button>
    <a href="{{ url_for('students.list_students') }}" class="btn btn-secondary">إلغاء</a>
</form>
{% endblock %}
